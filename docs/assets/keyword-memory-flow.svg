<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" width="960" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Keyword Memory Core Flow</title>
  <desc id="desc">Flowchart showing capture, AI parsing, sync, review sampling, and full listing behavior.</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 12px; }
    .lane-label { fill: #374151; font-size: 11px; font-weight: 700; letter-spacing: .08em; }
    .step-title { fill: #111827; font-size: 13px; font-weight: 700; }
    .step-sub { fill: #6b7280; font-size: 11px; }
    .arrow-label { fill: #374151; font-size: 10px; font-weight: 700; }
    .small { fill: #6b7280; font-size: 10px; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="960" height="760" fill="#ffffff"/>
  <text x="40" y="44" class="title">Keyword Memory 核心流程图</text>
  <text x="40" y="66" class="subtitle">从手动速记/AI 原文解析到本地优先保存、Supabase 同步、随机五个复习与全量展示。</text>

  <rect x="34" y="96" width="892" height="168" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="7,5"/>
  <text x="50" y="118" class="lane-label">CAPTURE</text>
  <rect x="78" y="146" width="150" height="62" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="153" y="171" text-anchor="middle" class="step-title">打开首页</text>
  <text x="153" y="190" text-anchor="middle" class="step-sub">手动速记 / AI 解析</text>

  <polygon points="326,132 414,177 326,222 238,177" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="326" y="174" text-anchor="middle" class="step-title">选择模式?</text>
  <text x="326" y="191" text-anchor="middle" class="step-sub">manual / ai</text>

  <rect x="502" y="112" width="168" height="62" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="586" y="137" text-anchor="middle" class="step-title">填写标题</text>
  <text x="586" y="156" text-anchor="middle" class="step-sub">关键词块可持续添加</text>

  <rect x="502" y="204" width="168" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="586" y="231" text-anchor="middle" class="step-title">粘贴原文</text>

  <rect x="744" y="196" width="148" height="58" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="818" y="219" text-anchor="middle" class="step-title">AI 拆解</text>
  <text x="818" y="237" text-anchor="middle" class="step-sub">Edge Function / fallback</text>

  <rect x="34" y="294" width="892" height="142" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="7,5"/>
  <text x="50" y="316" class="lane-label">SAVE AND SYNC</text>
  <rect x="92" y="342" width="160" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="172" y="365" text-anchor="middle" class="step-title">生成知识点</text>
  <text x="172" y="383" text-anchor="middle" class="step-sub">title · keywords · tag</text>

  <rect x="328" y="342" width="160" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="408" y="365" text-anchor="middle" class="step-title">写入本地</text>
  <text x="408" y="383" text-anchor="middle" class="step-sub">localStorage 保底</text>

  <polygon points="604,330 692,371 604,412 516,371" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="604" y="367" text-anchor="middle" class="step-title">已登录?</text>
  <text x="604" y="384" text-anchor="middle" class="step-sub">Supabase Auth</text>

  <rect x="744" y="342" width="148" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="818" y="365" text-anchor="middle" class="step-title">云端 upsert</text>
  <text x="818" y="383" text-anchor="middle" class="step-sub">knowledge_items</text>

  <rect x="34" y="466" width="892" height="210" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" stroke-dasharray="7,5"/>
  <text x="50" y="488" class="lane-label">REVIEW</text>
  <rect x="84" y="518" width="160" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="164" y="541" text-anchor="middle" class="step-title">进入复习页</text>
  <text x="164" y="559" text-anchor="middle" class="step-sub">加载全部知识点</text>

  <rect x="304" y="518" width="162" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="385" y="541" text-anchor="middle" class="step-title">默认随机五个</text>
  <text x="385" y="559" text-anchor="middle" class="step-sub">排除上一组后抽样</text>

  <rect x="522" y="518" width="162" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="603" y="541" text-anchor="middle" class="step-title">遮罩回忆</text>
  <text x="603" y="559" text-anchor="middle" class="step-sub">点击揭晓关键词</text>

  <rect x="744" y="494" width="148" height="54" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="818" y="517" text-anchor="middle" class="step-title">换一组</text>
  <text x="818" y="535" text-anchor="middle" class="step-sub">不重复上一组</text>

  <rect x="744" y="594" width="148" height="54" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="818" y="617" text-anchor="middle" class="step-title">全部展示</text>
  <text x="818" y="635" text-anchor="middle" class="step-sub">浏览完整知识库</text>

  <path d="M228 177 H238" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M414 162 H502" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="438" y="146" width="44" height="18" rx="4" fill="#ffffff" opacity=".94"/>
  <text x="460" y="159" text-anchor="middle" class="arrow-label">手动</text>
  <path d="M414 191 C448 198 464 210 502 222" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="438" y="198" width="34" height="18" rx="4" fill="#ffffff" opacity=".94"/>
  <text x="455" y="211" text-anchor="middle" class="arrow-label">AI</text>
  <path d="M670 226 H744" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M502 143 C440 220 300 268 252 342" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M818 254 C818 296 238 286 172 342" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M252 371 H328" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M488 371 H516" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M692 371 H744" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="700" y="354" width="24" height="18" rx="4" fill="#ffffff" opacity=".94"/>
  <text x="712" y="367" text-anchor="middle" class="arrow-label">是</text>
  <path d="M604 412 C604 446 238 476 164 518" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="548" y="427" width="24" height="18" rx="4" fill="#ffffff" opacity=".94"/>
  <text x="560" y="440" text-anchor="middle" class="arrow-label">否</text>
  <path d="M164 576 C170 626 334 630 385 576" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M466 547 H522" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M684 535 H744" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M744 521 C708 488 430 484 385 518" stroke="#9333ea" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow-purple)"/>
  <path d="M684 559 C724 574 748 594 774 594" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <rect x="42" y="704" width="474" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <line x1="56" y1="718" x2="88" y2="718" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="96" y="722" class="small">UI navigation</text>
  <line x1="188" y1="718" x2="220" y2="718" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="228" y="722" class="small">Data write</text>
  <line x1="312" y1="718" x2="344" y2="718" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="352" y="722" class="small">Sync / randomize</text>
</svg>
